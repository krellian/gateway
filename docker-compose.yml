version: "2.4"

services:
  webthings-gateway:
    container_name: webthings-gateway
    build: .
    restart: unless-stopped
    network_mode: host
    # "ports" are ignored because of "network_mode: host". Either use "ports"
    # or "network_mode: host".
    #ports:
    #  - "8080:8080"
    #  - "4443:4443"
    environment:
      - "TZ=Europe/London"
      - "DBUS_SYSTEM_BUS_ADDRESS=unix:path=/host/run/dbus/system_bus_socket"
    volumes:
      - webthings-data:/root/.webthings
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "10"
    labels:
      io.balena.features.dbus: '1'
      io.balena.features.supervisor-api: '1'
      io.balena.features.sysfs: '1'
    cap_add:
      ## Network admin capability for dnsmasq
      - NET_ADMIN
    # USB serial devices are detected dynamically at runtime by the
    # usb-monitor.sh script rather than being statically mapped here.
    # This means USB dongles can be plugged/unplugged without restarting
    # the container. See docker/usb-monitor.sh for details.
    #
    # The usb-cgroup-helper sidecar writes cgroup device-whitelist rules
    # so that device nodes created via mknod are actually accessible.
    # If Bluetooth, the container needs to run in privileged mode.
    #privileged: true

  # Tiny privileged sidecar that whitelists USB serial device classes
  # (ttyACM major 166, ttyUSB major 188) in the gateway container's
  # cgroup. This allows the gateway to access USB dongles without
  # running privileged itself. See docker/usb-cgroup-helper/ for details.
  usb-cgroup-helper:
    build: docker/usb-cgroup-helper
    restart: unless-stopped
    privileged: true
    environment:
      - "GATEWAY_SERVICE=webthings-gateway"
    labels:
      io.balena.features.balena-socket: '1'
      io.balena.features.sysfs: '1'
      io.balena.features.procfs: '1'

volumes:
  webthings-data: